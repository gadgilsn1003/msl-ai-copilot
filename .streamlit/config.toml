[theme]
base = "light"
primaryColor = "#0066CC"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#EEF2FF"
textColor = "#1A2332"
font = "sans serif"

[server]
maxUploadSize = 50
enableCORS = false
enableXsrfProtection = true
headless = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
installTracer = false
fixMatplotlib = true

[logger]
level = "info"
